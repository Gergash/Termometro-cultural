# Social Thermometer Score - Configuration
# Score 0-100: higher = healthier sentiment, lower = more concern

score:
  min: 0
  max: 100
  base: 100  # Start from 100, subtract crisis points

# Sentiment weights (negative adds to crisis, positive reduces it)
sentiment:
  positive: -0.5   # Reduces crisis score
  neutral: 0.0     # No impact
  negative: 1.5    # Adds to crisis (default weight for negative)

# Urgency multipliers (applied per mention)
urgency:
  low: 0.5
  medium: 1.0
  high: 2.0
  critical: 3.0

# Engagement: high engagement amplifies impact (reach)
engagement:
  enabled: true
  multiplier_cap: 2.0   # Max multiplier from engagement (e.g. 2x for viral)
  # Engagement tiers: score = 1 + (tier_multiplier - 1) up to cap
  tiers:
    - { min_engagement: 0,    multiplier: 1.0 }   # baseline
    - { min_engagement: 10,   multiplier: 1.2 }
    - { min_engagement: 50,   multiplier: 1.5 }
    - { min_engagement: 200,  multiplier: 2.0 }

# Topic weights (optional: some topics matter more for "crisis")
# If not listed, weight = 1.0
topics:
  security: 1.3
  taxes: 1.2
  corruption: 1.4
  public_administration: 1.1
  infrastructure: 1.0
  public_services: 1.2
  other: 0.8

# Trend calculation (week-over-week)
trend:
  threshold_improving: 5   # Score increase >= 5 => improving
  threshold_declining: -5  # Score decrease <= -5 => declining
  # Between => stable

# Top concerns: how many to return
top_concerns_count: 5
